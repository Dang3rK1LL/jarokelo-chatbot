<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Járókelő Külsős Chatbot</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <nav class="topbar">
        <div class="nav-tabs">
            <a href="#" id="btn-external" onclick="switchBot('external', event)" class="nav-tab active external">
                Külső chatbot
            </a>

            <a href="#" id="btn-internal" onclick="switchBot('internal', event)" class="nav-tab">
                Belső chatbot
            </a>
        </div>
    </nav>

    <main class="page">

        <section class="hero-text">
            

            <h1 id="title">Járókelő Bejelentő Asszisztens</h1>

            <p id="desc">
                Közterületi hibabejelentés gyorsan és egyszerűen chatbot segítségével.
            </p>
        </section>

        <section class="chat-section">
            <div class="chat-wrapper">
                <div id="webchat"></div>
            </div>
        </section>

    </main>

    <!-- Botpress Embedded Webchat -->
    <script>
        const bots = {
            external: {
                title: "Járókelő Bejelentő Asszisztens",
                desc: "Közterületi hibabejelentés gyorsan és egyszerűen chatbot segítségével.",
                config: {
                    "botId": "8ace8ec2-5110-4798-a82a-eed6cdd182c6",
                    "clientId": "4fe7d893-11f5-4d09-acec-2ee8bafb391d",
                    "configuration": {
                        "version": "v2",
                        "color": "#3276EA",
                        "embeddedChatId": "webchat",
                        "variant": "solid",
                        "themeMode": "light",
                        "allowFileUpload": true,
                        "conversationHistory": false
                    }
                }
            },
            internal: {
                title: "Járókelő Adminisztrációs Asszisztens",
                desc: "A chatbot segítségével adminisztratív és ügykezelési feladatokat lehet tesztelni.",
                config: {
                    "botId": "f454ea98-8703-4299-a890-1a9425955a82",
                    "clientId": "7d9ed7b3-5ed6-4778-a6a9-b7e8b1e6d63c",
                    "configuration": {
                        "version": "v2",
                        "color": "#3276EA",
                        "embeddedChatId": "webchat", /* Ezzel kényszerítjük be a dobozba! */
                        "variant": "solid",
                        "themeMode": "light",
                        "allowFileUpload": true,
                        "conversationHistory": false
                    }
                }
            }
        };

        function switchBot(type, e) {
            if (e) e.preventDefault();

            // Update UI
            document.getElementById('btn-external').classList.toggle('active', type === 'external');
            
            const btnInternal = document.getElementById('btn-internal');
            btnInternal.classList.toggle('active', type === 'internal');
            btnInternal.classList.toggle('internal', type === 'internal');
            
            document.getElementById('title').innerText = bots[type].title;
            document.getElementById('desc').innerText = bots[type].desc;

            // Reset Chatbot DOM
            const wrapper = document.querySelector('.chat-section');
            wrapper.innerHTML = '<div class="chat-wrapper"><div id="webchat"></div></div>';
            
            // Remove old Botpress scripts & clean globals
            document.querySelectorAll('script[src*="botpress"]').forEach(s => s.remove());
            const rootEl = document.getElementById('bp-webchat-container');
            if (rootEl) rootEl.remove();

            if (window.botpressWebChat) window.botpressWebChat = undefined;
            if (window.botpress) window.botpress = undefined;

            // Re-inject core and config
            const injectScript = document.createElement('script');
            injectScript.src = "https://cdn.botpress.cloud/webchat/v3.6/inject.js";
            injectScript.onload = () => {
                window.botpress.init(bots[type].config);
            };
            document.body.appendChild(injectScript);
        }

        // Initialize default
        document.addEventListener('DOMContentLoaded', () => {
            switchBot('external');
        });
    </script>

</body>
</html>
