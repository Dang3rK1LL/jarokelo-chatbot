<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Járókelő Külsős Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="topbar">
        <div class="nav-tabs">
            <a href="index.html" class="nav-tab active external">
                Külső chatbot
            </a>

            <a href="belso.html" class="nav-tab">
                Belső chatbot
            </a>
        </div>
    </nav>

    <main class="layout">

        <section class="left-panel">
            <div class="glass-card">
                <div class="badge external">
                    Külsős felület
                </div>

                <h1>
                    Járókelő Bejelentő Asszisztens
                </h1>

                <p>
                    Üdvözlünk a Járókelő külsős chatbot felületén.
                </p>

                <p>
                    A chatbot segítségével gyorsan és egyszerűen
                    küldhetsz közterületi hibabejelentést.
                </p>
            </div>
        </section>

        <section class="chat-panel">
            <div class="chat-wrapper">
                <div id="webchat"></div>
            </div>
        </section>

    </main>

    <!-- Botpress Embedded Webchat -->
    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>

    <script>
        window.botpress.init({
            botId: "8ace8ec2-5110-4798-a82a-eed6cdd182c6",
            clientId: "20260320160658-S8A1OH57",
            selector: "#webchat"
        });
    </script>

</body>
</html>
